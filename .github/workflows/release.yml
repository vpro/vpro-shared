---
name: release
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/REL-')
    permissions:
      contents: write
    env:
      MAVEN_ARGS: '--no-transfer-progress --color always'
    steps:
      - name: echo
        run: echo {{ $github.ref }}
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
          cache: maven
      - name: Release
        run: |
          git config --global user.name 'github actions'
          git config --global user.email 'github@meeuw.org'
          mvn  -Pdeploy --batch-mode  -Darguments=-DskipTests  release:prepare release:perform
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_SECRET_KEY_PASSPHRASE }}
